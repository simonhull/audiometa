version: "2"

run:
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true

linters:
  default: none
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nolintlint
    - perfsprint
    - predeclared
    - recvcheck
    - revive
    - staticcheck
    - testifylint
    - thelper
    - unconvert
    - unused
    - usestdlibvars
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*github.com/simonhull/audiometa.File).Close
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104   # Duplicate of errcheck
        - G304   # File path from variable - this library opens user-provided paths by design
        - G307   # Deferred file close - false positives on best-effort cleanup
        - G115   # Integer overflow conversion
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nestif:
      min-complexity: 5
    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: unused-parameter
        - name: confusing-naming
    staticcheck:
      checks:
        - all
        - -ST1003

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Tests have different requirements
      - path: _test\.go
        linters:
          - errcheck
          - forcetypeassert
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - govet
          - nestif
          - nilerr
          - nolintlint
          - revive
          - testifylint
          - thelper
          - unparam
      - path: _test\.go
        linters:
          - staticcheck
        text: "QF"
      - path: _test\.go
        text: 'shadow: declaration of "err"'

      # cmd/ tools are utilities, not library code
      - path: cmd/
        linters:
          - errcheck
          - forcetypeassert
          - gocritic
          - gocyclo
          - gosec
          - nestif
          - revive

      # Library opens user-provided file paths by design
      - linters: [gosec]
        text: "G304"
      # Default file permissions - intentional 0o644 for artwork extraction
      - linters: [gosec]
        text: "G301|G306"
      # Format brand constants ("M4A ", "M4B ") are intentionally repeated
      - linters: [goconst]
        text: 'string `M4[AB] ` has .* occurrences'
      # Format parsers intentionally return (nil, nil) on missing optional data
      # (no moov/udta/meta/ilst/covr atom, no ID3v2 tag, etc.) so callers see
      # absent metadata rather than an error. This is the library's documented
      # "graceful degradation" contract.
      - linters: [nilerr]
        path: internal/(m4a|mp3|flac|ogg)/
      # Examples are simple demos; they can use log.Fatalf and don't need
      # the same complexity gates as library code.
      - linters: [gocritic]
        path: examples/
        text: "exitAfterDefer"
      - linters: [gocyclo]
        path: examples/
      # Examples take user paths (file globs, output dirs); G703/G706 are taint
      # warnings appropriate for servers, not for CLI demos.
      - linters: [gosec]
        path: examples/
        text: "G703|G706"
      # Test fixtures pre-allocate slices and append into them; the capacity is
      # an upper bound, not a length guarantee.
      - linters: [makezero]
        path: _test\.go
      # Stringly-typed table-driven tests in technical.go intentionally use
      # nested if blocks to mirror MP3 frame parsing structure.
      - linters: [nestif]
        path: internal/mp3/technical\.go
      # Map keys with trailing spaces are part of the audio format spec (4-char atom names)
      - linters: [gocritic]
        text: "mapKey: suspicious whitespace"
      # Unnamed results are idiomatic for simple returns
      - linters: [gocritic]
        text: "unnamedResult"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
